# Kernel environment for the conda-express JupyterLite demo.
# jupyterlite-xeus downloads these packages from emscripten-forge at build
# time and makes them available to the xeus-python kernel at runtime.
name: xeus-python-kernel
channels:
  - https://repo.prefix.dev/emscripten-forge-4x
  - https://conda.anaconda.org/conda-forge
dependencies:
  - xeus-python
  - numpy
  - matplotlib
  - ipywidgets
