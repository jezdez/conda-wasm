context:
  version: "0.1.0"

package:
  name: conda-wasm
  version: ${{ version }}

source:
  path: ../../python

build:
  noarch: python
  number: 1
  script:
    - test -f $RECIPE_DIR/../../crates/conda-wasm/pkg/conda_wasm.js
    - test -f $RECIPE_DIR/../../crates/conda-wasm/pkg/conda_wasm_bg.wasm
    - mkdir -p conda_wasm/runtime_assets
    - cp $RECIPE_DIR/../../crates/conda-wasm/pkg/conda_wasm.js conda_wasm/runtime_assets/
    - cp $RECIPE_DIR/../../crates/conda-wasm/pkg/conda_wasm_bg.wasm conda_wasm/runtime_assets/
    - ${PYTHON} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools >=64
  run:
    - python >=3.12

tests:
  - python:
      imports:
        - conda_wasm
        - conda_wasm.runtime
      pip_check: false

about:
  homepage: https://github.com/jezdez/conda-wasm
  license: BSD-3-Clause
  summary: >
    Browser runtime and conda plugins for WebAssembly conda environments,
    including solver, extractor, shard prefetch, IPython magics, and virtual
    packages.
