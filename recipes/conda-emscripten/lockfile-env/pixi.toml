[workspace]
name = "conda-emscripten-lockfile"
description = "Generates an emscripten-wasm32 lockfile for cx-wasm to bootstrap conda in the browser"
channels = [
    "../../../output",
    "https://repo.prefix.dev/emscripten-forge-4x",
    "conda-forge",
]
platforms = ["emscripten-wasm32"]

[dependencies]
python = ">=3.12"
pyjs = ">=4.0.2"
conda = "==26.1.1"
conda-emscripten = "==0.1.0"
