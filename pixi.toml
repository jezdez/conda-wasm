[workspace]
name = "conda-wasm"
description = "Browser and WebAssembly tooling for conda"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
license = "BSD-3-Clause"

[dependencies]
rust = ">=1.85"
sccache = ">=0.10"

[activation.env]
RUSTC_WRAPPER = "sccache"

[tasks]
wasm-test = "cargo test --manifest-path crates/conda-wasm/Cargo.toml"
wasm-doc = "cargo doc --manifest-path crates/conda-wasm/Cargo.toml --no-deps"

[feature.web.dependencies]
python = ">=3.12"

[feature.web.tasks]
wasm-build = { cmd = "PATH=\"$HOME/.cargo/bin:$PATH\" wasm-pack build --target web --release", cwd = "crates/conda-wasm" }
wasm-build-dev = { cmd = "PATH=\"$HOME/.cargo/bin:$PATH\" wasm-pack build --target web --dev", cwd = "crates/conda-wasm" }
wasm-copy = { cmd = "cp pkg/conda_wasm.js www/conda_wasm.js && cp pkg/conda_wasm_bg.wasm www/conda_wasm_bg.wasm", cwd = "crates/conda-wasm", depends-on = ["wasm-build"] }
wasm-copy-dev = { cmd = "cp pkg/conda_wasm.js www/conda_wasm.js && cp pkg/conda_wasm_bg.wasm www/conda_wasm_bg.wasm", cwd = "crates/conda-wasm", depends-on = ["wasm-build-dev"] }
wasm-serve = { cmd = "python www/serve.py 8080 --directory www", cwd = "crates/conda-wasm", depends-on = ["wasm-copy"] }
wasm-serve-dev = { cmd = "python www/serve.py 8080 --directory www", cwd = "crates/conda-wasm", depends-on = ["wasm-copy-dev"] }
conda-wasm-test-prep = { cmd = "test -f ../../recipes/conda/lockfile-env/pixi.lock || (echo 'Run pixi run -e recipes build-conda-wasm-lockfile first' >&2; exit 1); cp ../../recipes/conda/lockfile-env/pixi.lock www/conda-wasm.lock && mkdir -p www/packages && cp ../../output/noarch/conda-*.conda ../../output/noarch/frozendict-*.conda ../../output/noarch/conda-wasm-*.conda www/packages/ 2>/dev/null; true", cwd = "crates/conda-wasm", depends-on = ["wasm-copy-dev"] }
conda-wasm-test = { cmd = "echo 'Open http://localhost:8080/conda-test.html' && python www/serve.py 8080 --directory www", cwd = "crates/conda-wasm", depends-on = ["conda-wasm-test-prep"] }
wasm-clean = { cmd = "cargo clean && rm -rf pkg www/conda_wasm.js www/conda_wasm_bg.wasm", cwd = "crates/conda-wasm" }

[feature.docs.dependencies]
sphinx = ">=7.0"
conda-sphinx-theme = ">=0.2"
myst-parser = ">=3.0"
sphinx-design = ">=0.6"
sphinx-copybutton = ">=0.5"
sphinx-reredirects = ">=0.1"
sphinx-sitemap = ">=2.5"

[feature.docs.tasks]
docs = { cmd = "sphinx-build -b dirhtml . _build/dirhtml", cwd = "docs" }
docs-serve = { cmd = "python -m http.server", cwd = "docs/_build/dirhtml" }
docs-clean = { cmd = "rm -rf _build", cwd = "docs" }

[feature.recipes.dependencies]
rattler-build = ">=0.35"

[feature.recipes.tasks]
build-conda = { cmd = "rattler-build build --recipe recipes/conda/recipe.yaml -c conda-forge" }
build-frozendict-noarch = { cmd = "rattler-build build --recipe recipes/frozendict-noarch/recipe.yaml -c conda-forge" }
build-conda-wasm = { cmd = "test -f crates/conda-wasm/pkg/conda_wasm.js || (echo 'Run pixi run -e web wasm-build first' >&2; exit 1); rattler-build build --recipe recipes/conda-wasm/recipe.yaml -c conda-forge" }
build-conda-wasm-lockfile = { cmd = "pixi install", cwd = "recipes/conda/lockfile-env", depends-on = ["build-conda", "build-frozendict-noarch", "build-conda-wasm"] }

[feature.demo.dependencies]
python = ">=3.12"
jupyterlite-core = ">=0.5"
jupyterlite-xeus = ">=4.0"
jupyterlab = ">=4.0,<5"
micromamba = ">=2.0"
nodejs = ">=20"

[feature.demo.tasks]
demo-build = { cmd = "python build.py", cwd = "demo" }
demo-build-local = { cmd = "python build.py --with-local", cwd = "demo" }
demo-serve = { cmd = "echo 'Open http://localhost:8888/lab/index.html' && python -m http.server 8888 --directory _output", cwd = "demo" }
demo = { depends-on = ["demo-build-local", "demo-serve"] }
demo-clean = { cmd = "rm -rf _output _env .jupyterlite.doit.db", cwd = "demo" }

[environments]
docs = ["docs"]
web = ["web"]
recipes = ["recipes"]
demo = ["demo"]
