name: Docs & Demo

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "README.md"
      - "pixi.toml"
      - "pixi.lock"
      - "lite/**"
      - "crates/cx-wasm/**"
      - "conda-emscripten/**"
      - "cx-jupyterlite/**"
      - "recipes/**"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "README.md"
      - "pixi.toml"
      - "pixi.lock"
      - "lite/**"
      - "crates/cx-wasm/**"
      - "conda-emscripten/**"
      - "cx-jupyterlite/**"
      - "recipes/**"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: docs
      - name: Build docs
        run: pixi run -e docs docs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs
          path: docs/_build/dirhtml

  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          environments: default web recipes lite

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Install wasm-pack
        run: pixi run cargo install wasm-pack

      - name: Build cx-wasm (WASM)
        run: pixi run -e web wasm-build

      - name: Build conda recipes
        run: |
          pixi run -e recipes build-conda-emscripten
          pixi run -e recipes build-frozendict-noarch
          pixi run -e recipes build-conda-emscripten-plugin
          pixi run -e recipes build-cx-wasm-kernel

      - name: Build JupyterLite site
        run: pixi run -e lite lite-build-local

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: demo
          path: lite/_output

  pages:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [docs, demo]

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs
          path: _site

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: demo
          path: _site/demo

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
