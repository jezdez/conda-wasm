name: Docs & Demo

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "README.md"
      - "pixi.toml"
      - "pixi.lock"
      - "demo/**"
      - "crates/conda-wasm/**"
      - "python/**"
      - "jupyterlite/**"
      - "recipes/**"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "README.md"
      - "pixi.toml"
      - "pixi.lock"
      - "demo/**"
      - "crates/conda-wasm/**"
      - "python/**"
      - "jupyterlite/**"
      - "recipes/**"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          environments: docs
      - name: Build docs
        run: pixi run -e docs docs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs
          path: docs/_build/dirhtml

  demo:
    name: Build demo
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_BASEDIRS: ${{ github.workspace }}
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Restore demo build cache
        id: demo-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        continue-on-error: true
        with:
          path: demo/_output
          key: demo-${{ runner.os }}-${{ hashFiles('pixi.toml', 'pixi.lock', 'demo/**', 'crates/conda-wasm/**', 'python/**', 'jupyterlite/**', 'recipes/**') }}

      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        if: steps.demo-cache.outputs.cache-hit != 'true'
        with:
          environments: default web recipes demo

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        if: steps.demo-cache.outputs.cache-hit != 'true'

      - name: Build conda-wasm (WASM)
        if: steps.demo-cache.outputs.cache-hit != 'true'
        run: pixi run -e web wasm-build

      - name: Build conda recipes
        if: steps.demo-cache.outputs.cache-hit != 'true'
        run: |
          pixi run -e recipes build-conda-wasm-lockfile

      - name: Build JupyterLite site
        if: steps.demo-cache.outputs.cache-hit != 'true'
        run: pixi run -e demo demo-build-local

      - name: Write sccache summary
        if: always() && steps.demo-cache.outputs.cache-hit != 'true'
        run: |
          if [ -n "${SCCACHE_PATH:-}" ] && [ -x "$SCCACHE_PATH" ]; then
            SCCACHE_BIN="$SCCACHE_PATH"
          elif command -v sccache >/dev/null 2>&1; then
            SCCACHE_BIN="sccache"
          else
            echo "sccache was not available for this run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### sccache stats"
            echo '```'
            "$SCCACHE_BIN" --show-stats
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save demo build cache
        if: steps.demo-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        continue-on-error: true
        with:
          path: demo/_output
          key: ${{ steps.demo-cache.outputs.cache-primary-key }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: demo
          path: demo/_output

  pages:
    name: Deploy docs and demo
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [docs, demo]

    permissions:
      contents: read
      pages: write # publish the generated docs and demo site to GitHub Pages
      id-token: write # mint the OIDC token required by actions/deploy-pages

    environment:
      name: github-pages

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs
          path: _site

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: demo
          path: _site/demo

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
